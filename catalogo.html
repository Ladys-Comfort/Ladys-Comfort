<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo | Ladys Comfort</title>
  <link rel="icon" href="icono-ladys.png">
  <meta name="description" content="Explora toda nuestra colección de pijamas Ladys Comfort.">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/catalogo.css">
  <script src="js/theme.js"></script>
</head>
<body>

<!-- ─── CART OVERLAY ─── -->
<div id="cart-overlay"></div>

<!-- ─── CART PANEL ─── -->
<div id="cart-panel">
  <div class="cart-header">
    <h2>Tu selección</h2>
    <button class="cart-close" onclick="closeCartPanel()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 5L5 15M5 5l10 10"/>
      </svg>
    </button>
  </div>
  <div id="cart-body"></div>
  <div id="cart-foot">
    <div class="cart-total-row">
      <span>Total</span>
      <span id="cart-total">$0</span>
    </div>
    <button class="btn-wa" onclick="sendWhatsApp()">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Pedir por WhatsApp
    </button>
    <p class="cart-note">Te respondemos directamente por WhatsApp 🌸</p>
  </div>
</div>

<!-- ─── HEADER ─── -->
<header>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">
      <img src="logo.png" class="logo-img" alt="Lady's Comfort">
      Ladys Comfort
    </a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html"    class="nav-link">Inicio</a></li>
      <li><a href="catalogo.html" class="nav-link active">Catálogo</a></li>
      <li><a href="index.html#contacto" class="nav-link">Contacto</a></li>
    </ul>
    <div class="nav-actions">
            <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="cart-btn" onclick="openCartPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-badge">0</span>
      </button>
      <button class="menu-toggle" id="menu-toggle">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
</header>

<!-- ─── PAGE ─── -->
<div class="cat-page">

  <!-- Hero header -->
  <div class="cat-hero">
    <div class="cat-hero-inner">
      <div>
        <p class="cat-eyebrow">✦ Colección completa</p>
        <h1>Catálogo de pijamas</h1>
        <p>Encuentra el conjunto perfecto para ti</p>
      </div>
      <span id="results-count"></span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="cat-toolbar">
    <!-- Filtros de color -->
    <div class="filter-bar">
      <button class="filter-btn on" data-f="todos" onclick="setFilter('todos')">Todos</button>
      <button class="filter-btn" data-f="rosa" onclick="setFilter('rosa')">
        <span class="filter-dot" style="background:#ff3f96"></span>Rosa
      </button>
      <button class="filter-btn" data-f="azul" onclick="setFilter('azul')">
        <span class="filter-dot" style="background:#4da6ff"></span>Azul
      </button>
      <button class="filter-btn" data-f="amarillo" onclick="setFilter('amarillo')">
        <span class="filter-dot" style="background:#ffe040"></span>Amarillo
      </button>
      <button class="filter-btn" data-f="verde" onclick="setFilter('verde')">
        <span class="filter-dot" style="background:#3ddc84"></span>Verde
      </button>
      <button class="filter-btn" data-f="turquesa" onclick="setFilter('turquesa')">
        <span class="filter-dot" style="background:#00d4c8"></span>Turquesa
      </button>
    </div>

    <!-- Ordenar -->
    <div class="sorter">
      <label for="sorter-sel">Ordenar:</label>
      <select id="sorter-sel" onchange="setSorter(this.value)">
        <option value="nuevo">Más recientes</option>
        <option value="precio-asc">Precio: menor a mayor</option>
        <option value="precio-desc">Precio: mayor a menor</option>
        <option value="nombre">Nombre A–Z</option>
      </select>
    </div>
  </div>

  <!-- Grid -->
  <div class="cat-main">
    <div id="products-grid">
      <!-- Renderizado por JS -->
    </div>
  </div>

</div>

<!-- ─── FLOAT CART ─── -->
<button id="cart-float" onclick="openCartPanel()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
    <line x1="3" y1="6" x2="21" y2="6"/>
    <path d="M16 10a4 4 0 01-8 0"/>
  </svg>
  <span class="cart-badge">0</span>
</button>

<!-- ─── FIREBASE + SCRIPTS ─── -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/cart.js"></script>
<script src="js/catalogo.js"></script>

<script>
window.addEventListener("scroll", () =>
  document.getElementById("navbar").classList.toggle("scrolled", scrollY > 50)
);
</script>

</body>
</html>
